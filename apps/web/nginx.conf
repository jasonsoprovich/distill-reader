server {
  listen 8080;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  # Full Content-Security-Policy is tuned in Phase 8 once article-image
  # and audio origins are finalized (see docs/PLAN.md §10.1, §10.5, §8).

  location / {
    try_files $uri /index.html;
  }
}
