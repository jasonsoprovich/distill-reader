version: 2
updates:
  # pnpm workspace — a single root entry covers every package under
  # /apps and /packages (Dependabot reads the workspace's pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # PLAN §10.6/§11 — "pin base image digests" is only worth doing if
  # something keeps the pins current; Dependabot opens a PR per Dockerfile
  # when a pinned base image gets a new digest.
  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/packages/db"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/docker/piper"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
