services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exposed so host-run tooling (pnpm db:migrate, pnpm dev) can reach it
      # per the README's local-dev flow; containers on the compose network
      # still address it as `postgres:5432` regardless of this mapping.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "apps/api/dist/scripts/seed-user.js"]
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      WEB_ORIGIN: ${WEB_ORIGIN}
      INITIAL_USER_EMAIL: ${INITIAL_USER_EMAIL}
      INITIAL_USER_PASSWORD: ${INITIAL_USER_PASSWORD}
      INITIAL_USER_NAME: ${INITIAL_USER_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT:-3001}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      WEB_ORIGIN: ${WEB_ORIGIN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      PIPER_BASE_URL: ${PIPER_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      # rw, not ro: on-demand summary/TTS generation runs synchronously in
      # the API process (mirrors the existing summary route — no job-queue
      # infrastructure exists elsewhere in this codebase), so the API
      # writes synthesized audio files here itself rather than dispatching
      # to the worker.
      - audio_storage:/data/audio:rw
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$$API_PORT/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      PIPER_BASE_URL: ${PIPER_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - audio_storage:/data/audio:rw
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    environment:
      # Also needed at container start (not just build time): nginx's
      # envsubst-on-templates entrypoint renders it into the CSP header.
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      - api

  # Optional local providers. Enable with: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  # Enable with: docker compose --profile piper up. Builds the official
  # piper-tts[http] HTTP server (docker/piper/Dockerfile) rather than
  # pulling rhasspy/wyoming-piper, which speaks the Wyoming protocol, not
  # HTTP — incompatible with this project's base_url provider clients.
  piper:
    build:
      context: docker/piper
    profiles: ["piper"]
    restart: unless-stopped
    environment:
      PIPER_VOICE: ${PIPER_VOICE:-en_US-lessac-medium}
    volumes:
      - piper_data:/data
    ports:
      # Published to the host (not just the compose network) so a
      # host-run `pnpm dev` api/worker — the common local-dev flow per the
      # README's `docker compose up -d postgres` step — can reach it at
      # http://localhost:5001. Host port defaults to 5001, not the
      # container's native 5000: macOS binds 5000 by default for AirPlay
      # Receiver (ControlCenter), so 5000 silently fails to publish on Mac.
      # Full-stack `docker compose up --build` deployments are unaffected —
      # they can still use http://piper:5000 on the internal network.
      - "${PIPER_PORT:-5001}:5000"

  # Enable with: docker compose --profile kokoro up. Pre-built image (no
  # Dockerfile of our own, unlike Piper) — Kokoro-FastAPI's images ship
  # every built-in voice baked in already, so there's no per-voice download
  # step or volume to persist. Pinned to the current release-branch tag
  # (v0.6.0) rather than :latest, which Kokoro-FastAPI's own docs warn can
  # point at unreleased master-branch builds.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.6.0
    profiles: ["kokoro"]
    restart: unless-stopped
    ports:
      # Same reasoning as piper's port publish above — reachable at
      # http://localhost:8880 from a host-run api/worker.
      - "${KOKORO_PORT:-8880}:8880"

  # Enable with: docker compose --profile relay-agent up. Runs on the SAME
  # machine as piper/kokoro above (a user's own PC), not on the cloud
  # deployment — connects outbound to a cloud-hosted Distill instance so it
  # can dispatch TTS synthesis to this hardware without the cloud ever
  # needing an inbound connection into this machine's network. Irrelevant
  # to the local (docker compose up -d postgres + pnpm dev) flow, where the
  # api already reaches piper/kokoro directly via their published ports
  # above — this profile is for pointing a *cloud* deployment at local
  # hardware. Get DISTILL_RELAY_TOKEN from Settings → Local TTS relay in the
  # cloud app first.
  relay-agent:
    build:
      context: .
      dockerfile: apps/relay-agent/Dockerfile
    profiles: ["relay-agent"]
    restart: unless-stopped
    environment:
      # Required for this profile to actually work — see .env.example's
      # DISTILL_CLOUD_URL/DISTILL_RELAY_TOKEN comments. Left as plain
      # optional interpolation (not docker compose's ${VAR:?msg} required-var
      # syntax) since compose validates every service's interpolations
      # eagerly regardless of active profile — using :? here would break
      # plain `docker compose up -d postgres` for everyone, not just people
      # who enable this profile.
      DISTILL_CLOUD_URL: ${DISTILL_CLOUD_URL}
      DISTILL_RELAY_TOKEN: ${DISTILL_RELAY_TOKEN}
      # Same env vars as the piper/kokoro services above — point at whichever
      # of them this agent should expose to the cloud. At least one required.
      PIPER_BASE_URL: ${PIPER_BASE_URL}
      KOKORO_BASE_URL: ${KOKORO_BASE_URL}

volumes:
  postgres_data:
  audio_storage:
  ollama_data:
  piper_data:
